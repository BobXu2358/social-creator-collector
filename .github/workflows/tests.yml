name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  offline-tests:
    name: offline tests (${{ matrix.os }} / py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, python: "3.9" }
          - { os: ubuntu-latest, python: "3.12" }
          - { os: windows-latest, python: "3.12" }   # guards the cross-platform path handling
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      # Installs httpx + the playwright python package, but NOT the browser binary
      # (no `playwright install`), so the offline suite stays network/browser-free.
      - name: Install package (with dev extras)
        run: pip install -e ".[dev]"
      - name: Run offline tests
        run: python -m unittest -v tests.test_collector
